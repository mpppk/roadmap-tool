name: CD

on:
  push:
    tags:
      - "v*"

jobs:
  ci:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

  build:
    name: Build (${{ matrix.platform }})
    needs: ci
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            bun_target: bun-linux-x64
            os_name: Linux
            arch_name: x86_64
            archive: roadmap-tool_Linux_x86_64.tar.gz
          - platform: linux-arm64
            runner: ubuntu-latest
            bun_target: bun-linux-arm64
            os_name: Linux
            arch_name: arm64
            archive: roadmap-tool_Linux_arm64.tar.gz
          - platform: darwin-arm64
            runner: macos-latest
            bun_target: bun-darwin-arm64
            os_name: Darwin
            arch_name: arm64
            archive: roadmap-tool_Darwin_arm64.tar.gz
          - platform: windows-x64
            runner: windows-latest
            bun_target: bun-windows-x64
            os_name: Windows
            arch_name: x86_64
            archive: roadmap-tool_Windows_x86_64.zip

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        env:
          BUN_TARGET: ${{ matrix.bun_target }}
        run: bun run build:binary

      - name: Package (Unix tar.gz)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.archive }} roadmap-tool

      - name: Package (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path roadmap-tool.exe -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum roadmap-tool_Linux_x86_64.tar.gz \
            roadmap-tool_Linux_arm64.tar.gz \
            roadmap-tool_Darwin_arm64.tar.gz \
            roadmap-tool_Darwin_x86_64.tar.gz \
            roadmap-tool_Windows_x86_64.zip > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/roadmap-tool_Linux_x86_64.tar.gz \
            dist/roadmap-tool_Linux_arm64.tar.gz \
            dist/roadmap-tool_Darwin_arm64.tar.gz \
            dist/roadmap-tool_Darwin_x86_64.tar.gz \
            dist/roadmap-tool_Windows_x86_64.zip \
            dist/checksums.txt
